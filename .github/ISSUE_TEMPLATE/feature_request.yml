name: Feature request
description: Suggest an improvement or new feature for Peekly
labels: ['enhancement']
body:
  - type: textarea
    id: problem
    attributes:
      label: What problem are you trying to solve?
      description: Describe the workflow pain or limitation you hit.
      placeholder: When I inspect a deeply nested component, navigating back up is tedious because…
    validations:
      required: true

  - type: textarea
    id: idea
    attributes:
      label: Proposed solution
      description: How would Peekly behave with your idea?
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      description: Other tools, workarounds, or different designs you've thought about.

  - type: dropdown
    id: scope
    attributes:
      label: Scope
      options:
        - Small (single section / button / hint)
        - Medium (new panel section, new gesture)
        - Large (architectural — new world, new framework support, etc.)

  - type: textarea
    id: extra
    attributes:
      label: Anything else?
